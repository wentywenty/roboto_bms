name: Build BMS Daemon Deb Package

on:
  push:
    branches: [main, master]
    paths:
      - "**"
      - ".github/workflows/build-deb.yml"
    tags:
      - "bms-v*"
  pull_request:
    branches: [main, master]
    paths:
      - "**"
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache dpkg-dev \
            libspdlog-dev libfmt-dev \
            python3-dev pybind11-dev

      - name: Build deb package
        run: ./build_deb.sh

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: roboto-bms-arm64-deb
          path: roboto-bms_*.deb

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/bms-v')
        uses: softprops/action-gh-release@v2
        with:
          files: roboto-bms_*.deb
